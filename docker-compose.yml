# Orchestration locale : API + démo (+ MLflow optionnel).
services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  demo:
    build:
      context: .
      dockerfile: docker/demo.Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - api

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
