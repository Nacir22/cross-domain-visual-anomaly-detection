name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (CPU-only PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Import du package
        run: python -c "import anomaly_detection; print(anomaly_detection.__version__)"

      - name: Tests (unitaires + smoke, sans entraînement lourd)
        run: pytest -m "not integration" --cov=anomaly_detection

      - name: Tests d'intégration API
        run: pytest -m integration
