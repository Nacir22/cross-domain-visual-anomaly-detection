# Configuration de base — couche inférieure, commune à tout le projet.
# Elle est surchargée ensuite par le domaine, le modèle puis le profil.
seed: 42
device: auto          # auto | cpu | cuda  (le profil peut le forcer)
image_size: 224
batch_size: 2
num_workers: 0
epochs: 2
learning_rate: 0.001
mixed_precision: false
